name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  BACKEND_SERVICE_NAME: vpasi-backend
  FRONTEND_SERVICE_NAME: vpasi-frontend
  REPO_NAME: vpasi-repo
  CLOUD_RUN_RUNTIME_SA: ${{ secrets.CLOUD_RUN_RUNTIME_SA }}

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate required deployment configuration
        run: |
          set -euo pipefail
          if [[ -z "${{ env.GCP_PROJECT_ID }}" ]]; then
            echo "Missing required GitHub secret: GCP_PROJECT_ID"
            exit 1
          fi
          if [[ -z "${{ env.CLOUD_RUN_RUNTIME_SA }}" ]]; then
            echo "Missing required GitHub secret: CLOUD_RUN_RUNTIME_SA"
            echo "Create a dedicated Cloud Run runtime service account and grant it Secret Manager Secret Accessor on required secrets."
            exit 1
          fi

      - name: Ensure required Google Cloud APIs are enabled (best effort)
        continue-on-error: true
        run: |
          set -euo pipefail
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            sqladmin.googleapis.com \
            serviceusage.googleapis.com \
            --project="${{ env.GCP_PROJECT_ID }}" || \
          echo "::warning::Could not enable APIs with the deployer service account. Enable APIs once with an owner account in Cloud Console."

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }} \
            --file=backend/Dockerfile \
            ./backend
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.FRONTEND_SERVICE_NAME }}:${{ github.sha }} \
            --file=frontend/Dockerfile \
            ./frontend
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.FRONTEND_SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE_NAME }} \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --service-account=${{ env.CLOUD_RUN_RUNTIME_SA }} \
            --allow-unauthenticated \
            --set-secrets="AT_API_KEY=AT_API_KEY:latest,AT_USERNAME=AT_USERNAME:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,POSTGRES_PASSWORD=POSTGRES_PASSWORD:latest" \
            --set-env-vars="GOOGLE_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GOOGLE_LOCATION=${{ env.GCP_REGION }},POSTGRES_USER=vpasi,POSTGRES_DB=vpasi,POSTGRES_HOST=/cloudsql/${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:vpasi-postgres" \
            --add-cloudsql-instances=${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:vpasi-postgres

      - name: Deploy frontend to Cloud Run
        id: deploy_frontend
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE_NAME }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          gcloud run deploy ${{ env.FRONTEND_SERVICE_NAME }} \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.FRONTEND_SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --service-account=${{ env.CLOUD_RUN_RUNTIME_SA }} \
            --allow-unauthenticated \
            --set-env-vars="VITE_API_URL=${BACKEND_URL},BACKEND_URL=${BACKEND_URL}"
          FRONTEND_URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE_NAME }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Show Frontend URL
        run: echo "Frontend is deployed at ${{ steps.deploy_frontend.outputs.url }}"
